{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TracLogix</title>

  <!-- Fonts (same as app) -->
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <!-- Main CSS -->
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <!-- Favicon -->
  <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">

  <!-- Theme: apply saved preference before paint -->
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body class="login-page">

  <!-- Decorative background shapes -->
  <div class="login-bg">
    <div class="login-bg-shape login-bg-shape--1"></div>
    <div class="login-bg-shape login-bg-shape--2"></div>
    <div class="login-bg-shape login-bg-shape--3"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <!-- Accent top bar -->
      <div class="login-accent"></div>

      <div class="login-body">
        <!-- Brand -->
        <div class="login-brand">
          <div class="login-brand-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 12h8"/>
              <path d="M12 8v8"/>
            </svg>
          </div>
          <div class="login-brand-text">
            <h1>TracLogix</h1>
            <span>Workshop Suite</span>
          </div>
        </div>

        <p class="login-subtitle">Sign in to your account</p>

        <!-- Error messages -->
        {% if error %}
        <div class="login-alert">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" action="{% url 'base:login' %}" id="loginForm" class="login-form">
          {% csrf_token %}

          <!-- Phone Number -->
          <div class="login-field">
            <label class="login-label" for="phone">Phone Number</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              <input
                type="tel"
                id="phone"
                name="phone"
                class="login-input"
                placeholder="Enter 10-digit number"
                maxlength="10"
                pattern="[0-9]{10}"
                value="{{ phone|default:'' }}"
                required
                autofocus
              >
            </div>
          </div>

          <!-- Password -->
          <div class="login-field">
            <label class="login-label" for="password">Password</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                type="password"
                id="password"
                name="password"
                class="login-input"
                placeholder="Enter your password"
                required
              >
              <button type="button" class="login-eye" id="togglePassword" aria-label="Show password">
                <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="login-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Sign In
          </button>
        </form>
      </div>

      <!-- Footer -->
      <div class="login-footer">
        <p>&copy; 2026 TracLogix. All rights reserved.</p>
      </div>
    </div>
  </div>

  <!-- Theme Toggle (floating) -->
  <button type="button" class="login-theme-toggle" id="themeToggle" title="Toggle theme">
    <svg id="themeToggleIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- Scripts -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {

      // Password visibility toggle
      var toggleBtn = document.getElementById('togglePassword');
      var passwordInput = document.getElementById('password');
      var eyeIcon = document.getElementById('eyeIcon');

      if (toggleBtn && passwordInput) {
        toggleBtn.addEventListener('click', function() {
          var isPassword = passwordInput.getAttribute('type') === 'password';
          passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
          eyeIcon.innerHTML = isPassword
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });
      }

      // Theme toggle
      var themeToggle = document.getElementById('themeToggle');
      var themeIcon = document.getElementById('themeToggleIcon');

      function applyTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('data-theme', theme);
        if (themeIcon) {
          themeIcon.innerHTML = theme === 'dark'
            ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
            : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        }
        localStorage.setItem('theme', theme);
      }

      applyTheme(localStorage.getItem('theme') || 'light');

      if (themeToggle) {
        themeToggle.addEventListener('click', function() {
          var current = localStorage.getItem('theme') || 'light';
          applyTheme(current === 'light' ? 'dark' : 'light');
        });
      }

      // Auto-format phone: digits only
      var phoneInput = document.getElementById('phone');
      if (phoneInput) {
        phoneInput.addEventListener('input', function() {
          this.value = this.value.replace(/\D/g, '').slice(0, 10);
        });
      }

      // Add focus animation to fields
      document.querySelectorAll('.login-input').forEach(function(input) {
        input.addEventListener('focus', function() {
          this.closest('.login-input-wrap').classList.add('focused');
        });
        input.addEventListener('blur', function() {
          this.closest('.login-input-wrap').classList.remove('focused');
        });
      });

    });
  </script>
</body>
</html>
